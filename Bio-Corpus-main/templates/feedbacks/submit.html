{% extends "base.html" %}
{% block title %}Retour sur l'article{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
<div class="card"><div class="card-body">
  <h4>Donner un retour</h4>
  <p class="text-muted small">{{ article.title }}</p>
  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary">Envoyer</button>
    <a href="{% url 'articles:detail' article.id %}" class="btn btn-link">Annuler</a>
  </form>
</div></div>
</div></div>
{% endblock %}
